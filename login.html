<!DOCTYPE html>
<html>

<head>

<title>

href="GREEN_EXECUTIVEBOARD_VERSION1X0/assets/css/login.css">

</head>

<body>

<div class="login-container">

<h1>
POLITEKNIK MERSING GREEN EXECUTIVE MONITORING SYSTEM
</h1>

<br>

<input
type="text"
id="username"
placeholder="Username">

<br><br>

<input
type="password"
id="password"
placeholder="Password">

<br><br>

<button onclick="login()">

Login

</button>

</div>

<script src="GREEN_EXECUTIVEBOARD_VERSION1X0/assets/js/auth.js"></script>

<script>
function login(){
  var username = document.getElementById('username').value;
  var password = document.getElementById('password').value;
  var target = '/green-executive-monitoring-system/GREEN_EXECUTIVEBOARD_VERSION1X0/modules/dashboard.html';
  if(username === 'superadmin' && password === 'Super@123'){
    localStorage.setItem('role','superadmin');
    window.location = target;
    return;
  }
  if(username === 'admin' && password === 'Admin@123'){
    localStorage.setItem('role','admin');
    window.location = target;
    return;
  }
  if(username === 'viewer' && password === 'Viewer@123'){
    localStorage.setItem('role','viewer');
    window.location = target;
    return;
  }
  alert('Invalid username or password');
}
</script>

</body>
